<!DOCTYPE html>
<html>
<head>
    <title>Test Beancount Parsing</title>
</head>
<body>
    <h1>Test Beancount Parsing</h1>
    <div id="results"></div>
    
    <script type="module">
        // Import the parseBeancountFile function
        async function testParsing() {
            try {
                // Sample beancount content with Dutch account names
                const beancountContent = `1970-01-01 open Activa:CA:Arcky:Checking   EUR
1970-01-01 open Activa:Cash          EUR
1970-01-01 open Uitgaven:Eten          EUR
1970-01-01 open Inkomsten:Bijdrage:Arthur   EUR
1970-01-01 open Vermogen:Opening-Balances       EUR
1970-01-01 open Passiva:Waarborg       EUR`;

                // Create a simple parsing function based on the one in utils.ts
                function parseBeancountFile(content) {
                    const accounts = [];
                    const lines = content.split('\n');
                    
                    for (const line of lines) {
                        const trimmedLine = line.trim();
                        if (trimmedLine.startsWith('1970-01-01 open ')) {
                            const accountName = trimmedLine.substring(16).trim();
                            const accountType = getAccountType(accountName);
                            accounts.push({
                                name: accountName,
                                type: accountType
                            });
                        }
                    }
                    
                    return accounts;
                }

                function getAccountType(accountName) {
                    const parts = accountName.split(':');
                    const rootAccount = parts[0];
                    
                    switch (rootAccount) {
                        case 'Assets':
                        case 'Liabilities':
                        case 'Equity':
                        case 'Income':
                        case 'Expenses':
                            return rootAccount;
                        case 'Activa':
                            return 'Assets';
                        case 'Passiva':
                            return 'Liabilities';
                        case 'Vermogen':
                            return 'Equity';
                        case 'Inkomsten':
                            return 'Income';
                        case 'Uitgaven':
                            return 'Expenses';
                        default:
                            return 'Expenses';
                    }
                }

                const accounts = parseBeancountFile(beancountContent);
                
                // Display results
                const resultsDiv = document.getElementById('results');
                resultsDiv.innerHTML = `
                    <h2>Parsed Accounts:</h2>
                    <ul>
                        ${accounts.map(account => `
                            <li><strong>${account.name}</strong> (Type: ${account.type})</li>
                        `).join('')}
                    </ul>
                    <h3>Summary:</h3>
                    <p>Total accounts found: ${accounts.length}</p>
                    <p>Account types: ${accounts.map(a => a.type).join(', ')}</p>
                `;
                
                console.log('Parsed accounts:', accounts);
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('results').innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }

        // Run the test
        testParsing();
    </script>
</body>
</html>
